<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 경제 퀴즈</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="경제퀴즈">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a;
    --card: #161928;
    --accent: #f5c842;
    --correct: #3de88a;
    --wrong: #ff4f4f;
    --text: #f0f0f0;
    --sub: #8892b0;
    --border: #232840;
    --expert: #c084fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px 80px;
  }
  .app { width: 100%; max-width: 440px; }

  /* ── 로딩 ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 20px;
    text-align: center;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-title { font-size: 18px; font-weight: 900; color: #fff; }
  .loading-sub   { font-size: 13px; color: var(--sub); line-height: 1.6; }
  .loading-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .step {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--sub);
    padding: 8px 14px;
    background: var(--card); border-radius: 8px;
    border: 1px solid var(--border);
    transition: color 0.3s, border-color 0.3s;
  }
  .step.active  { color: var(--accent); border-color: rgba(245,200,66,0.4); }
  .step.done    { color: var(--correct); border-color: rgba(61,232,138,0.3); }
  .step-icon { font-size: 16px; width: 22px; text-align: center; }

  /* ── 헤더 ── */
  .header { text-align: center; margin-bottom: 24px; padding-top: 8px; }
  .header-tag {
    display: inline-block; background: var(--accent); color: #000;
    font-size: 11px; font-weight: 900; letter-spacing: 2px;
    padding: 4px 12px; border-radius: 4px; margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 26px; font-weight: 700; color: #fff; line-height: 1.2;
  }
  .header h1 span { color: var(--accent); }
  .header-date { font-size: 12px; color: var(--sub); margin-top: 6px; }

  /* ── 진행 ── */
  .dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border); transition: background 0.3s, transform 0.2s;
  }
  .dot.ok   { background: var(--correct); transform: scale(1.15); }
  .dot.no   { background: var(--wrong); }
  .dot.cur  { background: var(--accent); transform: scale(1.2); }

  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .level-pill { font-size: 11px; font-weight: 900; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px; }
  .lv-easy   { background: #1a3a2a; color: var(--correct); }
  .lv-mid    { background: #2a2a10; color: var(--accent); }
  .lv-hard   { background: #2a1a1a; color: #ff8c42; }
  .lv-expert { background: #1e1030; color: var(--expert); }
  .lv-master { background: #0f1a2e; color: #60a5fa; }
  .q-counter { font-size: 12px; color: var(--sub); font-weight: 700; }

  .progress-track { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 18px; overflow: hidden; }
  .progress-fill  { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* ── 카드 ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px 20px; margin-bottom: 14px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), #ff8c00);
    opacity: 0; transition: opacity 0.3s;
  }
  .card.answered::before { opacity: 1; }

  .news-source {
    font-size: 11px; color: var(--sub); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .news-source::before { content: '📰'; font-size: 12px; }

  /* 배경 설명 */
  .context {
    font-size: 13px; color: #9ba5c0; line-height: 1.65;
    margin-bottom: 16px; padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--border);
    border-radius: 0 8px 8px 0;
    word-break: keep-all;
  }

  /* 기사 링크 */
  .article-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; padding: 8px 14px;
    background: rgba(245,200,66,0.06);
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: 8px; text-decoration: none;
    font-size: 12px; color: var(--accent);
    font-weight: 700; transition: background .18s;
    word-break: break-all; line-height: 1.4;
  }
  .article-link:hover { background: rgba(245,200,66,0.12); }
  .article-link::before { content: '🔗'; flex-shrink: 0; }

  .question {
    font-size: 18px; font-weight: 900; color: #fff;
    line-height: 1.55; margin-bottom: 20px; word-break: keep-all;
  }

  /* ── 보기 ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    background: transparent; border: 1.5px solid var(--border);
    border-radius: 12px; padding: 13px 16px;
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text); text-align: left; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: border-color .18s, background .18s, transform .15s;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(245,200,66,0.06); transform: translateX(4px); }
  .opt-num {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: var(--sub);
    transition: background .2s, color .2s;
  }
  .opt-text { word-break: keep-all; line-height: 1.4; }
  .opt.correct { border-color: var(--correct); background: rgba(61,232,138,.08); }
  .opt.correct .opt-num { background: var(--correct); color: #000; }
  .opt.wrong   { border-color: var(--wrong); background: rgba(255,79,79,.08); }
  .opt.wrong   .opt-num { background: var(--wrong); color: #fff; }
  .opt:disabled { cursor: default; transform: none !important; }

  /* ── 결과 배지 ── */
  .result-badge { display: none; font-size: 13px; font-weight: 700; padding: 8px 14px; border-radius: 8px; margin-top: 14px; text-align: center; }
  .result-badge.show { display: block; }
  .result-badge.ok { background: rgba(61,232,138,.12); color: var(--correct); }
  .result-badge.no { background: rgba(255,79,79,.10); color: var(--wrong); }

  /* ── 한 줄 해설 ── */
  .explanation {
    display: none; margin-top: 14px;
    background: rgba(245,200,66,.05); border: 1px solid rgba(245,200,66,.2);
    border-radius: 12px; padding: 14px;
    font-size: 14px; color: #bcc0d0; line-height: 1.7; word-break: keep-all;
    animation: slideIn .3s ease;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }
  .tip-label { font-size: 11px; font-weight: 900; color: var(--accent); letter-spacing: 1px; display: block; margin-bottom: 6px; }

  /* ── 전문가 해설 ── */
  .expert-wrap { margin-top: 12px; display: none; }
  .expert-wrap.show { display: block; }
  .expert-toggle {
    width: 100%; background: transparent;
    border: 1px solid rgba(192,132,252,.35); border-radius: 10px;
    color: var(--expert); font-size: 13px; font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 10px 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: background .18s;
  }
  .expert-toggle:hover { background: rgba(192,132,252,.08); }
  .expert-toggle .arr { transition: transform .25s; font-size: 10px; }
  .expert-toggle.open .arr { transform: rotate(180deg); }

  .expert-body {
    display: none; margin-top: 10px;
    padding: 18px; background: rgba(192,132,252,.04);
    border: 1px solid rgba(192,132,252,.15); border-radius: 12px;
    font-size: 13.5px; color: #c0c8e0; line-height: 1.8;
    animation: slideIn .25s ease;
  }
  .expert-body.open { display: block; }
  .expert-body p { margin-bottom: 12px; word-break: keep-all; }
  .expert-body p:last-child { margin-bottom: 0; }
  .expert-body strong { color: var(--expert); }
  .expert-label {
    font-size: 11px; font-weight: 900; color: var(--expert);
    letter-spacing: 1px; display: block; margin-bottom: 10px;
  }
  .takeaway {
    background: rgba(192,132,252,.10); border-left: 3px solid var(--expert);
    border-radius: 0 8px 8px 0; padding: 10px 14px !important;
    color: #d8b4fe !important; font-size: 13px !important;
  }

  /* ── 다음 버튼 ── */
  .next-btn {
    width: 100%; padding: 16px; border: none; border-radius: 12px;
    background: var(--accent); color: #000;
    font-size: 16px; font-weight: 900; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; display: none; transition: opacity .2s, transform .15s;
  }
  .next-btn:hover { opacity: .88; transform: translateY(-1px); }
  .next-btn.show  { display: block; }

  /* ── 결과 화면 ── */
  .final { display: none; text-align: center; }
  .final.show { display: block; }
  .final-emoji { font-size: 60px; margin-bottom: 14px; }
  .final-score {
    font-family: 'Gmarket Sans', sans-serif; font-size: 56px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #ff8c00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .final-total { font-size: 22px; color: var(--sub); }
  .final-msg { font-size: 18px; font-weight: 900; color: #fff; margin: 12px 0 6px; }
  .final-sub { font-size: 14px; color: var(--sub); line-height: 1.7; margin-bottom: 24px; word-break: keep-all; }
  .retry-btn {
    padding: 15px 36px; background: var(--accent); color: #000;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 900; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: opacity .2s;
  }
  .retry-btn:hover { opacity: .88; }

  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
  .quiz-area { animation: fadeIn .4s ease; }
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-tag">📈 TODAY'S ECONOMY</div>
    <h1>오늘의<br><span>경제 퀴즈</span></h1>
    <p class="header-date" id="headerDate"></p>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loadingArea">
    <div class="spinner"></div>
    <div>
      <div class="loading-title">오늘의 퀴즈 준비 중...</div>
      <div class="loading-sub">최신 뉴스를 읽고 퀴즈를 만들고 있어요</div>
    </div>
    <div class="loading-steps">
      <div class="step active" id="step1"><span class="step-icon">📰</span> 최신 뉴스 분석 중</div>
      <div class="step"        id="step2"><span class="step-icon">🧠</span> 퀴즈 5문제 생성 중</div>
      <div class="step"        id="step3"><span class="step-icon">📖</span> 전문가 해설 작성 중</div>
      <div class="step"        id="step4"><span class="step-icon">✅</span> 완료!</div>
    </div>
  </div>

  <!-- 퀴즈 영역 (로딩 후 표시) -->
  <div id="quizArea" style="display:none">
    <div class="dots" id="dots"></div>

    <div class="meta-row">
      <span class="level-pill" id="levelPill"></span>
      <span class="q-counter"  id="counter"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="card" id="qCard">
      <div class="news-source"  id="newsSource"></div>
      <div class="context"      id="context"></div>
      <div class="question"     id="questionText"></div>
      <div class="options"      id="optionsArea"></div>
      <div class="result-badge" id="resultBadge"></div>
      <div class="explanation"  id="explanation"></div>
      <a  class="article-link"  id="articleLink" target="_blank" rel="noopener" style="display:none"></a>
      <div class="expert-wrap"  id="expertWrap">
        <button class="expert-toggle" id="expertToggle" onclick="toggleExpert()">
          <span>🎓 경제학 박사의 심층 해설 보기</span>
          <span class="arr">▼</span>
        </button>
        <div class="expert-body" id="expertBody"></div>
      </div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextQ()"></button>
  </div>

  <!-- 결과 화면 -->
  <div class="final card" id="finalScreen">
    <div class="final-emoji" id="finalEmoji"></div>
    <div><span class="final-score" id="finalScore"></span><span class="final-total"> / 5</span></div>
    <div class="final-msg" id="finalMsg"></div>
    <div class="final-sub" id="finalSub"></div>
    <div class="dots" id="finalDots" style="margin-bottom:20px"></div>
    <button class="retry-btn" onclick="restart()">🔄 다시 풀기</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════
// 오늘의 뉴스 (매일 이 부분만 업데이트)
// ═══════════════════════════════════════
const TODAY_NEWS = `
[2026년 3월 첫째 주 주요 경제 뉴스]

1. 호르무즈 해협 봉쇄 위기
   - 미·이스라엘의 이란 공습으로 호르무즈 해협 봉쇄 위협
   - 전 세계 원유 수송량의 약 20%가 이 해협 통과
   - 브렌트유 배럴당 80달러 돌파, 13% 이상 급등

2. 코스피·환율 패닉
   - 코스피 하루 433포인트(7.49%) 폭락 → 5,358 마감
   - 원·달러 환율 1,500원 돌파 (금융위기 이후 최초)
   - 코스닥 사이드카 발동 (7.83% 급락)

3. 금값 사상 최고치
   - 현물 금 온스당 5,376달러 기록
   - 전쟁·불확실성 커질수록 금값 상승하는 이유: 안전자산

4. 미국 대법원 "트럼프 관세는 위헌" 판결
   - IEEPA(국제경제비상권한법) 이용 관세 부과가 권한 초과
   - 트럼프 행정부, 대안 모색 중

5. 중국 제조업 PMI 49 — 2개월 연속 위축
   - PMI 50 이하 = 경기 수축 신호
   - 내수 부진 + 수출 불확실성 겹쳐
`;

// ═══════════════════════════════════════
// Claude API 호출 → 퀴즈 자동 생성
// ═══════════════════════════════════════
const PROMPT = `
아래 최신 경제 뉴스를 읽고, 퀴즈 5개를 JSON 형식으로 만들어줘.

[오늘의 뉴스]
${TODAY_NEWS}

[난이도 구성] — 각 1개씩, 순서 그대로
1. 입문 (lv-easy)  — "얼마?" "누가?" 단순 사실
2. 초급 (lv-mid)   — 원인 묻기 "왜?"
3. 중급 (lv-hard)  — 결과·영향 묻기
4. 고급 (lv-expert)— 경제 메커니즘 묻기
5. 최고급 (lv-master)— 개념 연결 추론

[질문 규칙]
- 15자 이내, 짧고 임팩트 있게
- 4지선다, 정답 1개, 오답은 그럴듯하게

[한 줄 해설 (exp)]
- 2문장 이내, 핵심 키워드 1개만 <strong> 태그로 강조
- 생활 비유 1개 포함, "~해요" 말투

[전문가 해설 (expert_detail)] — 모든 문제에 작성
경제학 박사가 이론과 실제를 함께 설명하는 방식으로:
- <span class="expert-label">🎓 박사의 한마디</span> 로 시작
- <p> 태그로 2~3개 문단 구성
- 문단1: 경제학 이론 이름 + 쉬운 설명 (전문용어 뒤에 반드시 괄호로 쉬운 풀이)
- 문단2: 실제 사례나 역사적 선례로 연결
- 마지막 문단: <p class="takeaway"> 로 핵심 한 줄 정리
- <strong> 태그로 핵심 개념 강조
- 톤: 딱딱하지 않게, "~해요" "~거든요" "~이에요" 말투
- 길이: 200~300자 내외

[출력] 반드시 JSON만, 다른 텍스트 없이:
{
  "date": "오늘날짜(YYYY-MM-DD)",
  "quizzes": [
    {
      "levelClass": "lv-easy",
      "source": "2026.03.06 · 출처",
      "q": "질문 (15자 이내)",
      "opts": ["보기1", "보기2", "보기3", "보기4"],
      "ans": 0,
      "exp": "한 줄 해설 HTML",
      "expert_detail": "전문가 해설 HTML"
    }
  ]
}
`;

// ═══════════════════════════════════════
// 상태
// ═══════════════════════════════════════
let quizzes = [], cur = 0, score = 0;

// ═══════════════════════════════════════
// 로딩 애니메이션
// ═══════════════════════════════════════
function setStep(i, cls) {
  const ids = ['step1','step2','step3','step4'];
  if (ids[i]) document.getElementById(ids[i]).className = 'step ' + cls;
}

async function animateSteps(durationMs) {
  const steps = ['step1','step2','step3','step4'];
  const interval = durationMs / steps.length;
  for (let i = 0; i < steps.length; i++) {
    await new Promise(r => setTimeout(r, interval));
    if (i > 0) {
      document.getElementById(steps[i-1]).className = 'step done';
      document.getElementById(steps[i-1]).querySelector('.step-icon').textContent = '✓';
    }
    if (i < steps.length - 1)
      document.getElementById(steps[i]).className = 'step active';
    else
      document.getElementById(steps[i]).className = 'step done';
  }
}

// ═══════════════════════════════════════
// Claude API 호출
// ═══════════════════════════════════════
async function fetchQuiz() {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 3000,
      messages: [{ role: 'user', content: PROMPT }]
    })
  });
  if (!res.ok) throw new Error('API 오류: ' + res.status);
  const data = await res.json();
  const raw = data.content[0].text;
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('JSON 파싱 실패');
  return JSON.parse(match[0]);
}

// ═══════════════════════════════════════
// 초기화 — quiz_today.json 우선, 없으면 API 직접 호출
// ═══════════════════════════════════════
async function init() {
  const d = new Date();
  document.getElementById('headerDate').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} · 오늘의 5문제`;

  try {
    // ① quiz_today.json 먼저 시도 (GitHub Actions가 매일 생성)
    let data = await loadJSON();

    // ② JSON 없으면 Claude API 직접 호출 (fallback)
    if (!data) {
      updateStep(0);
      data = await fetchQuizFromAPI();
    }

    quizzes = data.quizzes;
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('quizArea').style.display   = 'block';
    initDots();
    render();

  } catch (e) {
    document.getElementById('loadingArea').innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:40px;margin-bottom:16px">😥</div>
        <div style="font-size:16px;font-weight:900;color:#fff;margin-bottom:8px">퀴즈 로딩 실패</div>
        <div style="font-size:13px;color:var(--sub);margin-bottom:20px">${e.message}</div>
        <button onclick="location.reload()" style="padding:12px 28px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:900;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

// quiz_today.json 로드 시도
async function loadJSON() {
  try {
    setStep(0, 'active'); // 뉴스 분석 중
    const res = await fetch(`quiz_today.json?v=${Date.now()}`);
    if (!res.ok) return null;
    const data = await res.json();
    // 오늘 날짜 확인
    const today = new Date().toISOString().slice(0, 10);
    if (data.date !== today) {
      console.log('어제 퀴즈 감지 — API 직접 호출로 전환');
      return null;
    }
    // 로딩 단계 빠르게 완료 표시
    await animateSteps(1200);
    return data;
  } catch {
    return null;
  }
}

// API 직접 호출 (fallback)
async function fetchQuizFromAPI() {
  const [data] = await Promise.all([
    fetchQuiz(),
    animateSteps(3200)
  ]);
  return data;
}

// ═══════════════════════════════════════
// 도트
// ═══════════════════════════════════════
function initDots() {
  ['dots','finalDots'].forEach(id => {
    document.getElementById(id).innerHTML =
      quizzes.map((_,i) =>
        `<div class="dot ${i===0?'cur':''}" id="${id==='dots'?'d':'fd'}${i}"></div>`
      ).join('');
  });
}

function updateDot(i, cls) {
  const d = document.getElementById('d'+i);
  if (d) { d.className = 'dot ' + cls; }
  const fd = document.getElementById('fd'+i);
  if (fd) { fd.className = 'dot ' + cls; }
  if (i+1 < quizzes.length) {
    const next = document.getElementById('d'+(i+1));
    if (next) next.className = 'dot cur';
  }
}

// ═══════════════════════════════════════
// 렌더
// ═══════════════════════════════════════
const LEVEL_MAP = {
  'lv-easy':   '🌱 입문',
  'lv-mid':    '🔥 초급',
  'lv-hard':   '⚡ 중급',
  'lv-expert': '💎 고급',
  'lv-master': '👑 최고급',
};

function render() {
  const q = quizzes[cur];
  document.getElementById('levelPill').textContent  = LEVEL_MAP[q.levelClass] || q.levelClass;
  document.getElementById('levelPill').className    = 'level-pill ' + q.levelClass;
  document.getElementById('counter').textContent    = `${cur+1} / ${quizzes.length}`;
  document.getElementById('progressFill').style.width = `${((cur+1)/quizzes.length)*100}%`;
  document.getElementById('newsSource').textContent  = q.source;

  // 배경 설명
  const ctxEl = document.getElementById('context');
  if (q.context) {
    ctxEl.textContent = q.context;
    ctxEl.style.display = 'block';
  } else {
    ctxEl.style.display = 'none';
  }

  document.getElementById('questionText').textContent = q.q;

  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  ['①','②','③','④'].forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-num">${lbl}</span><span class="opt-text">${q.opts[i]}</span>`;
    btn.onclick = () => pick(i);
    area.appendChild(btn);
  });

  // 초기화
  document.getElementById('resultBadge').className  = 'result-badge';
  document.getElementById('explanation').className  = 'explanation';
  document.getElementById('articleLink').style.display = 'none';
  document.getElementById('expertWrap').className   = 'expert-wrap';
  document.getElementById('expertBody').className  = 'expert-body';
  document.getElementById('expertToggle').className= 'expert-toggle';
  document.getElementById('nextBtn').className     = 'next-btn';
  document.getElementById('qCard').classList.remove('answered');
}

// ═══════════════════════════════════════
// 선택
// ═══════════════════════════════════════
function pick(idx) {
  const q = quizzes[cur];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);

  const ok = idx === q.ans;
  btns[idx].classList.add(ok ? 'correct' : 'wrong');
  if (!ok) btns[q.ans].classList.add('correct');
  if (ok) score++;

  updateDot(cur, ok ? 'ok' : 'no');

  // 배지
  const badge = document.getElementById('resultBadge');
  badge.textContent = ok ? '🎉 정답! 잘 알고 있네요' : `❌ 아쉽네요! 정답은 ${q.ans+1}번이에요`;
  badge.className   = 'result-badge show ' + (ok ? 'ok' : 'no');

  // 한 줄 해설
  document.getElementById('explanation').innerHTML =
    `<span class="tip-label">💡 한 줄 해설</span>${q.exp}`;
  document.getElementById('explanation').className = 'explanation show';

  // 기사 링크 (정답 선택 후 표시)
  const linkEl = document.getElementById('articleLink');
  if (q.article_url && q.article_title) {
    linkEl.href        = q.article_url;
    linkEl.textContent = q.article_title;
    linkEl.style.display = 'inline-flex';
  } else {
    linkEl.style.display = 'none';
  }

  // 전문가 해설
  if (q.expert_detail) {
    document.getElementById('expertBody').innerHTML = q.expert_detail;
    document.getElementById('expertWrap').className = 'expert-wrap show';
  }

  document.getElementById('qCard').classList.add('answered');
  document.getElementById('nextBtn').textContent =
    cur < quizzes.length - 1 ? '다음 문제 →' : '결과 보기 🏁';
  document.getElementById('nextBtn').className = 'next-btn show';
}

// ═══════════════════════════════════════
// 전문가 해설 토글
// ═══════════════════════════════════════
function toggleExpert() {
  const toggle  = document.getElementById('expertToggle');
  const body    = document.getElementById('expertBody');
  const isOpen  = body.classList.contains('open');
  toggle.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

// ═══════════════════════════════════════
// 다음 문제
// ═══════════════════════════════════════
function nextQ() {
  cur++;
  if (cur >= quizzes.length) { showFinal(); return; }
  render();
}

// ═══════════════════════════════════════
// 결과 화면
// ═══════════════════════════════════════
function showFinal() {
  document.getElementById('quizArea').style.display = 'none';
  const pct  = score / quizzes.length;
  const idx  = Math.min(Math.floor(pct * 5), 4);
  const data = [
    { e:'😢', m:'경제 뉴스, 조금 더 읽어봐요!',     s:'하루 기사 1개씩만 읽어도 금방 늘어요.' },
    { e:'😅', m:'조금씩 늘고 있어요!',              s:'틀린 문제 해설을 다시 읽어보세요.' },
    { e:'🙂', m:'제법 알고 있네요!',               s:'꾸준히 풀면 더 빠르게 늘어요.' },
    { e:'😎', m:'경제 고수 예비군!',               s:'주변에 경제 설명해줄 수 있는 수준이에요.' },
    { e:'🏆', m:'오늘의 경제 퀴즈 완벽 정복!',      s:'내일도 새 퀴즈로 도전해봐요!' },
  ][idx];

  document.getElementById('finalEmoji').textContent = data.e;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalMsg').textContent   = data.m;
  document.getElementById('finalSub').textContent   = data.s;
  document.getElementById('finalScreen').className  = 'final show';
}

// ═══════════════════════════════════════
// 다시 풀기
// ═══════════════════════════════════════
function restart() {
  cur = 0; score = 0;
  document.getElementById('finalScreen').className = 'final';
  document.getElementById('quizArea').style.display = 'block';
  initDots();
  render();
}

// ═══════════════════════════════════════
// PWA Service Worker
// ═══════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// 시작
init();
</script>
</body>
</html>
